# Cloudflare Pages configuration for The Invincible Blog
# Deploy with: wrangler pages deploy ./engine/dist --project-name=personal-blog

name = "personal-blog"
compatibility_date = "2024-01-01"

[build]
command = "cd engine && npm run build"
directory = "engine/dist"

[build.environment]
NODE_VERSION = "20"

[env.production]
name = "personal-blog-production"
compatibility_date = "2024-01-01"

[env.preview]
name = "personal-blog-preview"
compatibility_date = "2024-01-01"

[placement]
mode = "smart"

[tracing]
enabled = true
sampling_rate = 1.0